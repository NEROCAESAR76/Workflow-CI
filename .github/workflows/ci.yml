name: CI/CD Pipeline MLflow Docker
on:
  push:
    branches: [ main ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12.7'

      - name: Install Dependencies
        run: |
          pip install pandas scikit-learn mlflow==2.19.0

      - name: Run MLflow Project
        run: |
          # Menjalankan MLProject pakai env lokal biar ga ribet setup conda di server
          mlflow run . --env-manager local

      - name: Upload Artifacts ke GitHub (Syarat Skilled)
        uses: actions/upload-artifact@v4
        with:
          name: mlflow-artifacts
          path: mlruns/

      - name: Login ke Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build and Push Docker Image (Syarat Advance)
        run: |
          # Trik buat ngambil ID Eksperimen terbaru dari folder mlruns
          RUN_ID=$(ls -td ./mlruns/1/* | head -1 | xargs basename)
          echo "Dapat Run ID: $RUN_ID"
          
          # Build Docker
          mlflow models build-docker -m "runs:/$RUN_ID/random_forest_model" -n "${{ secrets.DOCKER_USERNAME }}/msml-model:latest"
          
          # Push ke Docker Hub
          docker push "${{ secrets.DOCKER_USERNAME }}/msml-model:latest"