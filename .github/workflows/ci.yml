name: Machine Learning Workflow CI

on:
  push:
    branches: [ main ]

jobs:
  train-model:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install mlflow pandas scikit-learn

    # 1. Menjalankan MLflow Project (Re-training Otomatis)
    - name: Run MLflow Project
      run: |
        cd MLProject
        mlflow run . --entry-point main --env-manager local

    # 2. Menyimpan Artefak Model ke Repositori (Mengarah ke root mlruns)
    - name: Upload Model Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: trained-model-artifacts
        path: mlruns/

    # 3. Membuat Docker Image Otomatis menggunakan mlflow build-docker
    - name: Build Docker Image from MLflow Model
      env:
        MLFLOW_ALLOW_FILE_STORE: "true"
      run: |
        # 1. Mencari lokasi folder mlruns di seluruh repositori secara dinamis
        MLRUNS_DIR=$(find . -type d -name "mlruns" | head -n 1)
        
        if [ -z "$MLRUNS_DIR" ]; then
          echo "❌ ERROR: Folder mlruns tidak ditemukan! Ini berarti proses training GAGAL atau file dataset hilang."
          exit 1
        fi
        
        echo "✅ Ditemukan database mlruns di: $MLRUNS_DIR"
        export MLFLOW_TRACKING_URI="$MLRUNS_DIR"
        
        # 2. Mengambil Run ID langsung dari struktur folder artifacts (Akurat 100%)
        LATEST_RUN_ID=$(find $MLRUNS_DIR -type d -name "artifacts" | awk -F'/' '{print $(NF-1)}' | head -n 1)
        echo "✅ Menggunakan Run ID terbaru: $LATEST_RUN_ID"
        
        # 3. Mengeksekusi pembuatan kontainer Docker
        mlflow models build-docker -m "runs:/$LATEST_RUN_ID/model" -n "nerosuprobo/workflow-ci-model:latest"