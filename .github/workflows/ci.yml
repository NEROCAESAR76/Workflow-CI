name: Machine Learning Workflow CI

on:
  push:
    branches: [ main ]

jobs:
  train-model:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install mlflow pandas scikit-learn

    # 1. Menjalankan MLflow Project (Re-training Otomatis)
    - name: Run MLflow Project
      run: |
        cd MLProject
        mlflow run . --entry-point main --env-manager local

    # 2. Menyimpan Artefak ke Repositori (Syarat Level Skilled - 3 pts)
    - name: Upload Model Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: trained-model-artifacts
        path: mlruns/

    # 3. Membuat Docker Image Otomatis menggunakan mlflow build-docker (Syarat Level Advance - 4 pts)
    - name: Build Docker Image from MLflow Model
      run: |
        # Mengambil RUN_ID terbaru dari folder mlruns yang berada di dalam MLProject
        LATEST_RUN_ID=$(ls MLProject/mlruns/0/ | grep -v "meta.yaml" | head -n 1)
        echo "Menggunakan Run ID terbaru: $LATEST_RUN_ID"
        
        # Menjalankan perintah build-docker dengan jalur model yang benar dan parameter versi baru
        mlflow models build-docker -m "MLProject/mlruns/0/$LATEST_RUN_ID/artifacts/model" -n "nerosuprobo/workflow-ci-model:latest"