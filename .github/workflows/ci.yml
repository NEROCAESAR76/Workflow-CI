name: Machine Learning Workflow CI

on:
  push:
    branches: [ main ]

jobs:
  train-model:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install mlflow pandas scikit-learn

    # 1. Menjalankan MLflow Project (Re-training Otomatis)
    - name: Run MLflow Project
      run: |
        cd MLProject
        mlflow run . --entry-point main --env-manager local

    # 2. Menyimpan Artefak Model ke Repositori (Mengarah ke root mlruns)
    - name: Upload Model Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: trained-model-artifacts
        path: mlruns/

    # 3. Membuat Docker Image Otomatis menggunakan mlflow build-docker (Jalur Root)
    - name: Build Docker Image from MLflow Model
      env:
        MLFLOW_ALLOW_FILE_STORE: "true"
      run: |
        # Mengatur tracking URI langsung ke folder mlruns di root terluar
        export MLFLOW_TRACKING_URI="mlruns"
        
        # Mencari ID folder eksperimen kustom di folder root mlruns
        EXP_ID=$(ls mlruns/ | grep -E '^[0-9]+$' | grep -v '^0$' || echo "0")
        echo "Menggunakan Experiment ID: $EXP_ID"
        
        # Mengambil Run ID terbaru dari folder root mlruns
        LATEST_RUN_ID=$(ls -t mlruns/$EXP_ID/ | grep -v "meta.yaml" | head -n 1)
        echo "Menggunakan Run ID terbaru hasil training: $LATEST_RUN_ID"
        
        # Membuat kontainer Docker otomatis dari model tersebut
        mlflow models build-docker -m "runs:/$LATEST_RUN_ID/model" -n "nerosuprobo/workflow-ci-model:latest"