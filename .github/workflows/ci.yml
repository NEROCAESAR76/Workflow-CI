name: Machine Learning Workflow CI

on:
  push:
    branches: [ main ]

jobs:
  train-model:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install mlflow pandas scikit-learn

    # 1. Menjalankan MLflow Project (Dipaksa menaruh mlruns di folder aktif)
    - name: Run MLflow Project
      env:
        MLFLOW_ALLOW_FILE_STORE: "true"
      run: |
        cd MLProject
        export MLFLOW_TRACKING_URI="file://$(pwd)/mlruns"
        
        echo "🚀 Menjalankan training MLflow..."
        mlflow run . --entry-point main --env-manager local
        
        echo "🔍 Memverifikasi pembuatan folder mlruns..."
        if [ ! -d "mlruns" ]; then
          echo "❌ FATAL: mlruns tetap tidak dibuat oleh MLflow!"
          exit 1
        fi
        echo "✅ Folder mlruns berhasil diamankan!"

    # 2. Menyimpan Artefak Model ke Repositori (Syarat Level Skilled)
    - name: Upload Model Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: trained-model-artifacts
        path: MLProject/mlruns/

    # 3. Membuat Docker Image Otomatis menggunakan mlflow build-docker (Syarat Level Advance)
    - name: Build Docker Image from MLflow Model
      env:
        MLFLOW_ALLOW_FILE_STORE: "true"
      run: |
        cd MLProject
        export MLFLOW_TRACKING_URI="mlruns"
        
        # Mengambil Experiment ID
        EXP_ID=$(ls mlruns/ | grep -E '^[0-9]+$' | grep -v '^0$' || echo "0")
        echo "✅ Menggunakan Experiment ID: $EXP_ID"
        
        # Mengambil Run ID
        LATEST_RUN_ID=$(ls -t mlruns/$EXP_ID/ | grep -v "meta.yaml" | head -n 1)
        echo "✅ Menggunakan Run ID terbaru: $LATEST_RUN_ID"
        
        # Jalankan Build Docker
        mlflow models build-docker -m "runs:/$LATEST_RUN_ID/model" -n "nerosuprobo/workflow-ci-model:latest"